<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Verification | Chitkara University</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        .location-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
            background: #f8fafc;
        }

        .location-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 100%;
            border: 1px solid var(--border-color);
        }

        .status-icon {
            width: 80px;
            height: 80px;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            transition: all 0.3s ease;
        }

        .status-icon i {
            width: 40px;
            height: 40px;
            color: var(--text-muted);
        }

        .status-loading { animation: pulse-bg 1.5s infinite; }
        @keyframes pulse-bg {
            0% { background-color: #f1f5f9; }
            50% { background-color: #e2e8f0; }
            100% { background-color: #f1f5f9; }
        }

        .status-success-icon { background: #e6f4ea !important; color: #27ae60 !important; }
        .status-error-icon { background: #fff5f5 !important; color: #d12026 !important; }

        h2 { margin-bottom: 12px; color: var(--text-color); }
        p { color: var(--text-muted); margin-bottom: 30px; line-height: 1.5; }

        .btn-location {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: none;
        }

        .btn-retry { background: var(--primary-color); color: white; }
        .btn-continue { background: #27ae60; color: white; }

        .distance-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #f1f5f9;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
            color: var(--text-color);
        }
    </style>
</head>
<body>
    <div class="location-container">
        <div class="location-card">
            <div class="status-icon status-loading" id="status-icon">
                <i data-feather="map-pin"></i>
            </div>
            <h2 id="status-title">Verifying Location...</h2>
            <p id="status-msg">Please allow location access to verify you are in the classroom.</p>
            
            <div id="distance-info" class="distance-badge" style="display: none;">
                Calculating distance...
            </div>

            <div style="margin-top: 24px;">
                <button id="retry-btn" class="btn-location btn-retry">Grant Permission & Retry</button>
                <button id="continue-btn" class="btn-location btn-continue">Enter Dashboard</button>
            </div>
        </div>
        
        <p style="margin-top: 24px; font-size: 0.85rem;">
            Campus Security: This activity requires physical presence at Chitkara University.
        </p>
    </div>

    <script src="location-check.js"></script>
    <script>feather.replace();</script>
</body>
</html>
