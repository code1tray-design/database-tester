<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chitkara University Student Portal - Access your courses, tests, and learning resources securely.">
    <meta name="keywords" content="Chitkara University, student portal, education, courses, tests">
    <meta name="author" content="Chitkara University">
    <link rel="icon" href="logo.svg" type="image/svg+xml">
    <title>Chitkara University - Student Portal</title>
    <!-- If using GitHub Pages with a project repository, replace 'repo-name' with your repository name -->
    <!-- <base href="/repo-name/"> -->
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="login-panel">
            <header class="login-header">
                <img src="logo.svg" alt="Chitkara University Logo" class="logo">
            </header>
            
            <main class="login-main">
                <h1>Welcome back</h1>
                <p class="subtitle">Please enter your details to continue.</p>

                <form id="login-form">
                    <div class="input-group">
                        <label for="student-name">Student Name</label>
                        <input type="text" id="student-name" required>
                    </div>
                    <div class="input-group">
                        <label for="roll-number">Roll Number</label>
                        <input type="text" id="roll-number" required>
                    </div>
                    
                    <div class="options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember for 30 days</label>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Sign In</button>
                    <p id="error-message" class="error"></p>
                </form>
                
                <div class="admin-access">
                    <p>Are you a teacher? <a href="admin.html" class="admin-link">Access Admin Portal</a></p>
                </div>
            </main>
        </div>
        <div class="illustration-panel">
             <img src="illustration.svg" alt="Illustration of a person at a helpdesk" class="illustration-svg">
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
