<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Download Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      text-align: center;
      padding: 40px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    img {
      max-width: 100%;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .download-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #007bff;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.3s;
    }
    .download-btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Download Image</h1>
    <p>Click below to view or download the image.</p>
    
    <!-- Replace IMAGE_URL_HERE with your image URL -->
    <img src="https://drive.google.com/uc?export=download&id=17a4yKLeeQMqct5zM4IukJNvwgPfgZL4o" alt="Preview Image">

    <!-- Replace DOWNLOAD_LINK_HERE with your direct download link -->
    <br>
    <a href="DOWNLOAD_LINK_HERE" class="download-btn" download>
      Download Image
    </a>
  </div>
</body>
</html>
