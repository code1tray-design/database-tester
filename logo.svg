<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350">
    <!-- Red Rounded Square -->
    <rect x="125" y="10" width="150" height="150" rx="15" fill="#d12026"/>
    
    <!-- White Geometric "C" design -->
    <g fill="white">
        <!-- Outer Angle -->
        <path d="M165,50 L235,50 L235,120 L215,120 L215,70 L165,70 Z"/>
        <!-- Middle Angle -->
        <path d="M165,85 L200,85 L200,120 L185,120 L185,100 L165,100 Z"/>
        <!-- Inner Square -->
        <rect x="165" y="110" width="10" height="10"/>
    </g>

    <!-- Text: CHITKARA -->
    <text x="200" y="240" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="900" font-size="64" fill="#000000" letter-spacing="-2">CHITKARA</text>
    
    <!-- Text: UNIVERSITY -->
    <text x="200" y="295" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="400" font-size="38" fill="#000000" letter-spacing="8">UNIVERSITY</text>
</svg>