<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Test - Chitkara University</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="test-body">
    <div class="test-layout">
        <!-- Test Header -->
        <header class="test-header">
            <div class="test-logo">
                <img src="logo.svg" alt="Chitkara University Logo">
            </div>
            <div class="test-meta">
                <div class="test-title">
                    <h2>Business Ethics - Module 1</h2>
                    <span class="test-status">In Progress</span>
                </div>
            </div>
            <div class="test-timer" id="test-timer">
                <i data-feather="clock"></i>
                <span id="timer-display">30:00</span>
            </div>
            <div class="test-actions">
                <button class="btn-primary submit-test-btn" id="submit-test">Submit Test</button>
            </div>
        </header>

        <!-- Main Test Area -->
        <div class="test-container">
            <main class="question-area">
                <div class="question-card">
                    <div class="question-number">Question <span id="current-question-num">1</span> of <span id="total-questions">10</span></div>
                    <div class="question-text">
                        <p id="question-content">Loading question...</p>
                    </div>
                    <div class="options-grid" id="options-container">
                        <!-- Options will be loaded here -->
                    </div>
                </div>
                
                <div class="navigation-btns">
                    <button class="btn-secondary" id="prev-btn" disabled>
                        <i data-feather="chevron-left"></i>
                        Previous
                    </button>
                    <button class="btn-secondary" id="next-btn">
                        Next
                        <i data-feather="chevron-right"></i>
                    </button>
                </div>
            </main>

            <!-- Question Palette -->
            <aside class="question-palette">
                <h3>Question Palette</h3>
                <div class="palette-grid" id="palette-grid">
                    <!-- Palette items will be loaded here -->
                </div>
                <div class="palette-legend">
                    <div class="legend-item"><span class="status-box answered"></span> Answered</div>
                    <div class="legend-item"><span class="status-box current"></span> Current</div>
                    <div class="legend-item"><span class="status-box unanswered"></span> Unanswered</div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Submit Modal (Hidden by default) -->
    <div id="submit-modal" class="modal">
        <div class="modal-content">
            <h3>Submit Test?</h3>
            <p>Are you sure you want to submit the test? You cannot change your answers after submission.</p>
            <div class="modal-actions">
                <button class="btn-secondary" id="cancel-submit">Cancel</button>
                <button class="btn-primary" id="confirm-submit">Confirm Submit</button>
            </div>
        </div>
    </div>

    <script src="test.js"></script>
</body>
</html>
